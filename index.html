<!DOCTYPE html><html lang="fi"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Ovimerkki</title>
<style>
 body{font-family:system-ui,sans-serif;margin:0;background:#111;color:#fff;text-align:center;
  display:flex;flex-direction:column;min-height:100vh;justify-content:center;gap:12px;padding:16px;box-sizing:border-box}
 h1{font-size:20px;margin:0}
 #dot{font-size:15px;font-weight:700}
 button{font-size:25px;font-weight:700;border:0;border-radius:18px;padding:24px;color:#111;cursor:pointer}
 .v{background:#22c55e}.b{background:#ef4444;color:#fff}.t{background:#eab308}
 .conn{background:#334155;color:#fff;font-size:16px;padding:14px}
 #s{font-size:14px;color:#aaa;min-height:20px}
</style></head><body>
<h1>🚪 Ovimerkki</h1>
<div id="dot">⚪ Ei yhteyttä</div>
<button class="v" onclick="send('v')">🟢 VAPAA</button>
<button class="b" onclick="send('b')">🔴 VARATTU</button>
<button class="t" onclick="send('t')">🟡 TENTATIVE</button>
<button class="conn" onclick="pair()">🔗 Yhdistä merkki</button>
<div id="s">Paina "Yhdistä merkki" kerran</div>
<script>
const SVC='0000ffe0-0000-1000-8000-00805f9b34fb',CHR='0000ffe1-0000-1000-8000-00805f9b34fb';
const NAMES={v:'VAPAA',b:'VARATTU',t:'TENTATIVE'};
let dev=null,char=null;
const S=m=>document.getElementById('s').textContent=m;
const dot=ok=>document.getElementById('dot').textContent=ok?'🟢 Yhdistetty':'⚪ Ei yhteyttä';
async function pickDevice(){
 dev=await navigator.bluetooth.requestDevice({filters:[{name:'OviMerkki'}],optionalServices:[SVC]});
 dev.addEventListener('gattserverdisconnected',onDisc);
}
async function ensureDevice(){
 if(dev)return;
 if(navigator.bluetooth.getDevices){
  const ds=await navigator.bluetooth.getDevices();
  const d=ds.find(x=>x.name==='OviMerkki');
  if(d){dev=d;dev.addEventListener('gattserverdisconnected',onDisc);return;}
 }
 await pickDevice();
}
async function connect(){
 await ensureDevice();
 const srv=await dev.gatt.connect();
 const svc=await srv.getPrimaryService(SVC);
 char=await svc.getCharacteristic(CHR);
 dot(true);
}
function onDisc(){char=null;dot(false);}
async function pair(){try{S('Valitse OviMerkki...');await pickDevice();await connect();S('Yhdistetty! Pidä sivu auki ja käytä nappeja.');}catch(e){S('Peruttu/virhe: '+e.message);dot(false);}}
async function send(cmd){
 for(let a=0;a<2;a++){
  try{
   if(!char||!dev.gatt.connected){S('Yhdistetään...');await connect();}
   await char.writeValue(new TextEncoder().encode(cmd));
   S('✓ '+NAMES[cmd]);return;
  }catch(e){
   char=null;
   if(a===1){S('Virhe — paina "Yhdistä merkki". '+e.message);dot(false);}
  }
 }
}
</script></body></html>
